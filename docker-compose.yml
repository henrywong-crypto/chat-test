services:

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Override DynamoDB endpoint to point at local container.
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      # Bind on all interfaces inside the container.
      SITE_ADDR: 0.0.0.0:3000
    depends_on:
      dynamodb-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/models || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  # ── Local DynamoDB ─────────────────────────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── One-shot table setup ───────────────────────────────────────────────────
  dynamodb-setup:
    image: amazon/aws-cli:latest
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        ENDPOINT=http://dynamodb-local:8000

        echo "Creating conversations table…"
        aws dynamodb create-table \
          --endpoint-url $$ENDPOINT \
          --table-name bedrock-rs-conversations \
          --attribute-definitions \
            AttributeName=userId,AttributeType=S \
            AttributeName=conversationId,AttributeType=S \
          --key-schema \
            AttributeName=userId,KeyType=HASH \
            AttributeName=conversationId,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          || echo "Table already exists"

        echo "Creating bots table…"
        aws dynamodb create-table \
          --endpoint-url $$ENDPOINT \
          --table-name bedrock-rs-bots \
          --attribute-definitions \
            AttributeName=userId,AttributeType=S \
            AttributeName=botId,AttributeType=S \
            AttributeName=visibility,AttributeType=S \
            AttributeName=createTime,AttributeType=N \
          --key-schema \
            AttributeName=userId,KeyType=HASH \
            AttributeName=botId,KeyType=RANGE \
          --global-secondary-indexes '[
            {
              "IndexName": "visibility-index",
              "KeySchema": [
                {"AttributeName": "visibility", "KeyType": "HASH"},
                {"AttributeName": "createTime",  "KeyType": "RANGE"}
              ],
              "Projection": {"ProjectionType": "ALL"}
            }
          ]' \
          --billing-mode PAY_PER_REQUEST \
          || echo "Table already exists"

        echo "Creating inference profiles table…"
        aws dynamodb create-table \
          --endpoint-url $$ENDPOINT \
          --table-name bedrock-rs-inference-profiles \
          --attribute-definitions \
            AttributeName=userId,AttributeType=S \
            AttributeName=modelId,AttributeType=S \
          --key-schema \
            AttributeName=userId,KeyType=HASH \
            AttributeName=modelId,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          || echo "Table already exists"

        echo "All tables ready."
    restart: "no"
